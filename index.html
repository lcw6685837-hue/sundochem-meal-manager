<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>선도화학 식수인원 관리 모니터</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="introScreen" class="intro-screen">
    <div class="intro-top-bar">
      <img src="logo.png" alt="SUNDOCHEM Logo">
      <span>선도화학(주)</span>
    </div>
    <div class="intro-content">
      <h1 class="intro-message">선도화학 가족 여러분의<br>건강하고 맛있는 식사를 응원합니다!</h1>
      <button class="intro-btn" onclick="enterKiosk()">입장하기</button>
    </div>
  </div>

  <div id="selectionScreen" class="selection-screen d-none">
    <h1 class="selection-title"><span class="blue-text">본인확인</span>을 <span class="blue-text">선택</span>하세요.</h1>
    
    <div class="selection-content">
      <div class="group-box box-sundo">
        <div class="group-title">선도화학</div>
        <div class="name-columns cols-3">
          <button class="name-btn" onclick="selectEmployeeFromList('0', '윤여환')">0-윤여환</button>
          <button class="name-btn" onclick="selectEmployeeFromList('1', '이정현')">1-이정현</button>
          <button class="name-btn" onclick="selectEmployeeFromList('2', '김영일')">2-김영일</button>
          <button class="name-btn" onclick="selectEmployeeFromList('3', '고명권')">3-고명권</button>
          <button class="name-btn" onclick="selectEmployeeFromList('4', '윤수익')">4-윤수익</button>
          <button class="name-btn" onclick="selectEmployeeFromList('5', '이창우')">5-이창우</button>
          <button class="name-btn" onclick="selectEmployeeFromList('6', '임승재')">6-임승재</button>
          <button class="name-btn" onclick="selectEmployeeFromList('7', '서형진')">7-서형진</button>
          <button class="name-btn" onclick="selectEmployeeFromList('8', '권오민')">8-권오민</button>
          <button class="name-btn" onclick="selectEmployeeFromList('9', '손지훈')">9-손지훈</button>
          <button class="name-btn" onclick="selectEmployeeFromList('10', '김연숙')">10-김연숙</button>
          <button class="name-btn" onclick="selectEmployeeFromList('11', '여남숙')">11-여남숙</button>
          <button class="name-btn" onclick="selectEmployeeFromList('12', '권정한')">12-권정한</button>
          <button class="name-btn" onclick="selectEmployeeFromList('13', '문남일')">13-문남일</button>
          <button class="name-btn" onclick="selectEmployeeFromList('14', '서명원')">14-서명원</button>
          <button class="name-btn" onclick="selectEmployeeFromList('15', '장동명')">15-장동명</button>
          <button class="name-btn" onclick="selectEmployeeFromList('16', '정원근')">16-정원근</button>
          <button class="name-btn" onclick="selectEmployeeFromList('17', '송명창')">17-송명창</button>
          <button class="name-btn" onclick="selectEmployeeFromList('18', '이상로')">18-이상로</button>
          <button class="name-btn" onclick="selectEmployeeFromList('19', '강석호')">19-강석호</button>
          <button class="name-btn" onclick="selectEmployeeFromList('20', '김자연')">20-김자연</button>
          <button class="name-btn" onclick="selectEmployeeFromList('21', '이요학')">21-이요학</button>
          <button class="name-btn" onclick="selectEmployeeFromList('22', '최종선')">22-최종선</button>
          <button class="name-btn" onclick="selectEmployeeFromList('23', '정민교')">23-정민교</button>
          <button class="name-btn" onclick="selectEmployeeFromList('24', '오진택')">24-오진택</button>
          <button class="name-btn" onclick="selectEmployeeFromList('25', '고동수')">25-고동수</button>
          <button class="name-btn" onclick="selectEmployeeFromList('26', '김동준')">26-김동준</button>
          <button class="name-btn" onclick="selectEmployeeFromList('27', '김재용')">27-김재용</button>
          <button class="name-btn" onclick="selectEmployeeFromList('28', '유영숙')">28-유영숙</button>
          <button class="name-btn" onclick="selectEmployeeFromList('29', '민정현')">29-민정현</button>
          <button class="name-btn" onclick="selectEmployeeFromList('30', '이용현')">30-이용현</button>
        </div>
      </div>

      <div class="box-middle">
        <div class="group-box box-seonil">
          <div class="group-title">선일기업</div>
          <div class="name-columns cols-2">
            <button class="name-btn" onclick="selectEmployeeFromList('31', '김창수')">31-김창수</button>
            <button class="name-btn" onclick="selectEmployeeFromList('32', '박홍복')">32-박홍복</button>
            <button class="name-btn" onclick="selectEmployeeFromList('33', '이동수')">33-이동수</button>
            <button class="name-btn" onclick="selectEmployeeFromList('34', '베스')">34-베스</button>
            <button class="name-btn" onclick="selectEmployeeFromList('35', '박할')">35-박할</button>
            <button class="name-btn" onclick="selectEmployeeFromList('36', '맥스')">36-맥스</button>
            <button class="name-btn" onclick="selectEmployeeFromList('37', '한상범')">37-한상범</button>
            <button class="name-btn" onclick="selectEmployeeFromList('38', '오해도')">38-오해도</button>
            <button class="name-btn" onclick="selectEmployeeFromList('39', '이운재')">39-이운재</button>
            <button class="name-btn" onclick="selectEmployeeFromList('40', '하헌구')">40-하헌구</button>
            <button class="name-btn" onclick="selectEmployeeFromList('41', '김기화')">41-김기화</button>
          </div>
        </div>

        <div class="group-box box-sundoind">
          <div class="group-title">선도산업</div>
          <div class="name-columns cols-1">
            <button class="name-btn" onclick="selectEmployeeFromList('42', '이인덕')">42-이인덕</button>
          </div>
        </div>
      </div>

      <div class="group-box box-visitor">
        <div class="group-title">방문객</div>
        <div class="name-columns cols-1">
          <button class="name-btn visitor-btn-new" onclick="selectVisitorFromList('IPA산업')">IPA산업</button>
          <button class="name-btn visitor-btn-new" onclick="selectVisitorFromList('선도화학 소속')">선도화학 소속</button>
          <button class="name-btn visitor-btn-new" onclick="selectVisitorFromList('선도산업 소속')">선도산업 소속</button>
          <button class="name-btn visitor-btn-new" onclick="selectVisitorFromList('기 타')">기 타</button>
        </div>
      </div>
    </div>
  </div>

  <div id="dashboardScreen" class="dashboard-container d-none">
    
    <div class="header-top-bar">
      <img src="logo.png" alt="SUNDOCHEM Logo" class="logo-img">
      <span class="logo-text">SUNDOCHEMICAL</span>
      <button onclick="toggleFullScreen()" class="fullscreen-btn">🔲 전체화면</button>
    </div>

    <header class="sub-header">
      <div class="clock-display" id="clockDisplay"></div>
      <div class="sundo-banner">
        <span class="red-text">S</span>UNDO <span class="red-text">M</span>EAL <span class="red-text">C</span>OUNT <span class="red-text">M</span>ONITORING
      </div>
    </header>

    <main class="single-layout">
      <section class="panel meal-panel-centered">
        <div class="emp-name-box" id="empNameDisplay">이름 표시 대기중</div>
        
        <div class="meal-buttons-large">
          <button class="meal-btn red" id="meal-아침" onclick="selectMeal('아침')">아침</button>
          <button class="meal-btn cyan" id="meal-점심" onclick="selectMeal('점심')">점심</button>
          <button class="meal-btn blue" id="meal-저녁" onclick="selectMeal('저녁')">저녁</button>
        </div>
        
        <button class="confirm-btn-large" onclick="submitData()">확 인</button>
      </section>

      <section class="panel message-panel">
        <div id="memoContainer" class="memo-container">
          <div id="memoDisplay" class="memo-display">
            <div id="memoText" class="memo-text"></div>
          </div>
          <textarea id="messageInput" class="message-box" placeholder="여기를 터치하여 식당 아주머니께 전달할 사항을 입력하세요..."></textarea>
        </div>
      </section>
    </main>
  </div>
  
  <div id="toast" class="toast"></div>

  <div id="visitorModal" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modalTitle">[소속] 식사 인원이 몇 명입니까?</h3>
      <div class="display-box modal-display" id="visitorCountDisplay">1</div>
      <div class="numpad modal-numpad">
        <button class="num-btn" onclick="inputVisitorCount(1)">1</button>
        <button class="num-btn" onclick="inputVisitorCount(2)">2</button>
        <button class="num-btn" onclick="inputVisitorCount(3)">3</button>
        <button class="num-btn" onclick="inputVisitorCount(4)">4</button>
        <button class="num-btn" onclick="inputVisitorCount(5)">5</button>
        <button class="num-btn" onclick="inputVisitorCount(6)">6</button>
        <button class="num-btn" onclick="inputVisitorCount(7)">7</button>
        <button class="num-btn" onclick="inputVisitorCount(8)">8</button>
        <button class="num-btn" onclick="inputVisitorCount(9)">9</button>
        <button class="num-btn" onclick="inputVisitorCount(0)">0</button>
        <button class="num-btn del-btn" onclick="deleteVisitorCount()">←</button>
        <button class="num-btn clear-btn" onclick="clearVisitorCount()">C</button>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn cancel" onclick="closeVisitorModal()">취 소</button>
        <button class="modal-btn confirm" onclick="confirmVisitorCount()">확 인</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
